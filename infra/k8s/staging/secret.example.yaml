# Copy to secret.yaml locally (gitignored) or create via kubectl:
# kubectl -n secagent-staging create secret generic secagent-staging-secrets \
#   --from-literal=GITHUB_WEBHOOK_SECRET=REPLACE \
#   --from-literal=GITHUB_APP_ID=REPLACE \
#   --from-file=GITHUB_APP_PRIVATE_KEY=./app.pem
apiVersion: v1
kind: Secret
metadata:
  name: secagent-staging-secrets
  namespace: secagent-staging
type: Opaque
stringData:
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"
  GITHUB_APP_ID: "REPLACE_ME"
