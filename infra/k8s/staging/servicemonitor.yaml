---
apiVersion: v1
kind: Service
metadata:
  name: secagent-metrics-stub
  namespace: secagent-staging
  labels:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: worker
    secagent.metrics/scrape: "true"
  annotations:
    secagent.io/metrics-path: "/metrics"
    secagent.io/metrics-port: "8787"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: 8787
      targetPort: 8787
