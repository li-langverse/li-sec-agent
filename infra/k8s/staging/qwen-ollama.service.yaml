apiVersion: v1
kind: Service
metadata:
  name: qwen-ollama
  namespace: secagent-staging
  labels:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: qwen
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: qwen
  ports:
    - name: http
      port: 11434
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-ollama-nodeport
  namespace: secagent-staging
  labels:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: qwen
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: li-sec-agent
    app.kubernetes.io/component: qwen
  ports:
    - name: http
      port: 11434
      targetPort: http
      nodePort: 31434
